<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>声景锚点</title>
<style>
@font-face {
  font-family: 'XianSheng';
  src: url('XianSheng-GaiZenMeChengNi-2.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f0e8;
  --accent: #c4956a;
  --accent-dark: #a07850;
  --accent-warm: #d4a55a;
  --text: #4a3f35;
  --text-light: #8a7e72;
  --card-bg: rgba(255, 253, 247, 0.82);
  --shadow: rgba(120, 100, 70, 0.18);
  --radius: 18px;
}

html, body {
  height: 100%;
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* 纸张纹理 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
  pointer-events: none;
  z-index: 9999;
}

/* 页面容器 */
.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 16px;
}

/* 标题 */
.title {
  font-family: 'XianSheng', Georgia, serif;
  font-size: 24px;
  color: var(--accent-dark);
  letter-spacing: 3px;
  margin-top: 28px;
  margin-bottom: 8px;
  text-align: center;
  position: relative;
}
.title::after {
  content: '';
  display: block;
  width: 60px;
  height: 2px;
  background: var(--accent);
  opacity: 0.5;
  margin: 8px auto 0;
  border-radius: 1px;
}

.subtitle {
  font-size: 12px;
  color: var(--text-light);
  letter-spacing: 2px;
  margin-bottom: 24px;
}

/* 唱片机区域 */
.turntable-area {
  position: relative;
  width: 320px;
  height: 320px;
  flex-shrink: 0;
}

/* 唱片 */
.vinyl {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 250px;
  height: 250px;
  margin-left: -125px;
  margin-top: -125px;
  border-radius: 50%;
  background: radial-gradient(
    circle,
    #b8845a 0%, #b8845a 14%,
    #2a2420 14.5%, #2a2420 100%
  );
  box-shadow:
    0 0 0 3px rgba(42,36,32,0.3),
    0 4px 20px rgba(42,36,32,0.25),
    inset 0 0 30px rgba(0,0,0,0.15);
  animation: spin 20s linear infinite;
  cursor: pointer;
  transition: box-shadow 0.3s;
  overflow: visible;
}
.vinyl.paused {
  animation-play-state: paused;
}
.vinyl::before {
  content: '';
  position: absolute;
  inset: 16%;
  border-radius: 50%;
  background: radial-gradient(circle, #d4a574 0%, #c49060 60%, #a87848 100%);
  box-shadow: inset 0 0 8px rgba(0,0,0,0.15);
}
.vinyl::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 12px;
  height: 12px;
  margin: -6px 0 0 -6px;
  border-radius: 50%;
  background: #2a2420;
  box-shadow: 0 0 0 2px #8a7060;
}

/* 黑胶纹路 */
.vinyl-grooves {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  overflow: hidden;
  pointer-events: none;
}
.vinyl-grooves::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: repeating-radial-gradient(
    circle at center,
    transparent 0px,
    transparent 3px,
    rgba(60,50,40,0.12) 3px,
    rgba(60,50,40,0.12) 3.5px
  );
}
/* 光泽 */
.vinyl-grooves::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.1) 0%,
    rgba(255,255,255,0.02) 40%,
    transparent 60%,
    rgba(255,255,255,0.06) 100%
  );
}

/* 中心标签文字 */
.vinyl-label {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
  z-index: 2;
  width: 70px;
}
.vinyl-label .label-text {
  font-family: 'XianSheng', Georgia, serif;
  font-size: 10px;
  color: #fffdf7;
  line-height: 1.4;
  opacity: 0.9;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* 城市图标 */
.city-icon {
  position: absolute;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--card-bg);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border: 1.5px solid rgba(196,149,106,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 2px 8px rgba(120,100,70,0.12);
  z-index: 10;
  user-select: none;
}
.city-icon:hover, .city-icon:active {
  transform: scale(1.15);
  border-color: var(--accent);
  box-shadow: 0 3px 14px rgba(196,149,106,0.3);
}
.city-icon .city-emoji {
  line-height: 1;
}

/* 城市图标位置 - 围绕唱片边缘 */
.city-icon[data-city="hongkong"]  { top: -8px;   left: 50%;  margin-left: -22px; }
.city-icon[data-city="chengdu"]   { top: 22px;  right: -8px; }
.city-icon[data-city="shanghai"]  { bottom: 22px; right: -8px; }
.city-icon[data-city="beijing"]   { bottom: -8px; left: 50%; margin-left: -22px; }
.city-icon[data-city="nanjing"]   { bottom: 22px; left: -8px; }
.city-icon[data-city="newyork"]   { top: 22px;  left: -8px; }

/* 提示文字 */
.hint {
  font-size: 13px;
  color: var(--text-light);
  margin-top: 20px;
  text-align: center;
  letter-spacing: 1px;
  opacity: 0.7;
}

/* 底部按钮 */
.bottom-btn {
  margin-top: auto;
  margin-bottom: 28px;
  padding: 10px 24px;
  border: 1.5px dashed var(--accent);
  border-radius: 24px;
  background: transparent;
  color: var(--accent-dark);
  font-size: 14px;
  font-family: 'XianSheng', Georgia, serif;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.bottom-btn:hover {
  background: var(--accent);
  color: #fff;
  border-style: solid;
}

/* ====== 模态卡片 ====== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(50,40,30,0.4);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}
.modal-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.modal-card {
  width: 88%;
  max-width: 360px;
  background: var(--card-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: var(--radius);
  box-shadow: 0 12px 40px rgba(42,36,32,0.2);
  padding: 28px 24px 24px;
  transform: translateY(60px);
  transition: transform 0.4s cubic-bezier(0.22, 0.9, 0.36, 1);
  position: relative;
}
.modal-overlay.active .modal-card {
  transform: translateY(0);
}

.modal-close {
  position: absolute;
  top: 12px;
  right: 14px;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: none;
  background: rgba(196,149,106,0.12);
  color: var(--text-light);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.modal-close:hover {
  background: rgba(196,149,106,0.25);
}

.modal-emoji {
  font-size: 36px;
  text-align: center;
  margin-bottom: 8px;
}

.modal-city {
  font-family: 'XianSheng', Georgia, serif;
  font-size: 28px;
  color: var(--accent-dark);
  text-align: center;
  margin-bottom: 4px;
  min-height: 38px;
}
.modal-city.hidden-city {
  color: var(--accent);
  letter-spacing: 6px;
}

.modal-music {
  font-size: 16px;
  color: var(--text);
  text-align: center;
  margin-bottom: 20px;
  font-family: 'XianSheng', Georgia, serif;
}

.modal-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}

.action-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 20px;
  border: none;
  border-radius: 14px;
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.action-btn.guess {
  background: var(--accent);
  color: #fff;
}
.action-btn.guess:hover {
  background: var(--accent-dark);
}
.action-btn.reveal {
  background: rgba(196,149,106,0.12);
  color: var(--accent-dark);
  border: 1.5px solid rgba(196,149,106,0.3);
}
.action-btn.reveal:hover {
  background: rgba(196,149,106,0.22);
}

/* 猜城市输入区 */
.guess-area {
  display: none;
  text-align: center;
  margin-top: 12px;
  animation: fadeIn 0.3s ease;
}
.guess-area.active {
  display: block;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.guess-input {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid #ddd5c8;
  border-radius: 10px;
  background: #fff;
  font-size: 15px;
  color: var(--text);
  outline: none;
  text-align: center;
  margin-bottom: 10px;
  transition: border-color 0.3s;
}
.guess-input:focus {
  border-color: var(--accent);
}

.guess-submit {
  padding: 10px 28px;
  border: none;
  border-radius: 20px;
  background: var(--accent);
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
}
.guess-submit:hover {
  background: var(--accent-dark);
}

.guess-result {
  margin-top: 10px;
  font-size: 14px;
  font-weight: 600;
  min-height: 20px;
}
.guess-result.correct {
  color: #6a9a5a;
}
.guess-result.wrong {
  color: #c07050;
}

/* 试听按钮 */
.listen-btn {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: var(--accent);
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 8px;
}
.listen-btn.active {
  display: flex;
}
.listen-btn:hover {
  background: var(--accent-dark);
}

/* 音频播放器 */
.audio-player {
  display: none;
  margin-top: 12px;
}
.audio-player.active {
  display: block;
}
.audio-player audio {
  width: 100%;
  height: 36px;
  border-radius: 8px;
}

/* 提示消息 */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-60px);
  background: var(--accent-dark);
  color: #fff;
  padding: 10px 24px;
  border-radius: 24px;
  font-size: 14px;
  z-index: 300;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="page">
  <!-- 标题 -->
  <h1 class="title">声景锚点</h1>

  <!-- 唱片机 -->
  <div class="turntable-area">
    <div class="vinyl" id="vinyl">
      <div class="vinyl-grooves"></div>
      <div class="vinyl-label">
        <div class="label-text">SOUND<br>SCAPE</div>
      </div>

      <!-- 6个城市图标 - 随唱片旋转 -->
      <div class="city-icon" data-city="hongkong" onclick="openCity('hongkong')">
        <span class="city-emoji">🏙️</span>
      </div>
      <div class="city-icon" data-city="chengdu" onclick="openCity('chengdu')">
        <span class="city-emoji">🎋</span>
      </div>
      <div class="city-icon" data-city="shanghai" onclick="openCity('shanghai')">
        <span class="city-emoji">🌆</span>
      </div>
      <div class="city-icon" data-city="beijing" onclick="openCity('beijing')">
        <span class="city-emoji">🏯</span>
      </div>
      <div class="city-icon" data-city="nanjing" onclick="openCity('nanjing')">
        <span class="city-emoji">🌸</span>
      </div>
      <div class="city-icon" data-city="newyork" onclick="openCity('newyork')">
        <span class="city-emoji">🗽</span>
      </div>
    </div>
  </div>

  <p class="hint">点击城市图标，开启声景之旅</p>

  <!-- 底部按钮 -->
  <button class="bottom-btn" onclick="goToMemo()">📝 添加我的声景</button>
</div>

<!-- 模态卡片 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal-card">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-emoji" id="modalEmoji"></div>
    <div class="modal-city" id="modalCity"></div>
    <div class="modal-music" id="modalMusic"></div>

    <div class="modal-actions" id="modalActions">
      <button class="action-btn guess" onclick="startGuess()">🎵 听音乐猜城市</button>
      <button class="action-btn reveal" onclick="revealCity()">🏙️ 直接揭晓答案~</button>
    </div>

    <!-- 猜城市输入区 -->
    <div class="guess-area" id="guessArea">
      <input type="text" class="guess-input" id="guessInput" placeholder="输入你猜的城市名">
      <button class="guess-submit" onclick="submitGuess()">确认</button>
      <div class="guess-result" id="guessResult"></div>
    </div>

    <!-- 试听按钮 -->
    <button class="listen-btn" id="listenBtn" onclick="playMusic()">🎧 试听歌曲</button>

    <!-- 音频播放器 -->
    <div class="audio-player" id="audioPlayer">
      <audio id="cityAudio" controls></audio>
    </div>
  </div>
</div>

<script>
// ====== 城市数据 ======
const cityData = {
  hongkong: {
    name: '香港',
    emoji: '🏙️',
    music: '《Everywhere We Go》',
    audio: 'hongkong.mp3',
    hasLocalAudio: true
  },
  chengdu: {
    name: '成都',
    emoji: '🎋',
    music: '《可能》',
    audio: 'chengdu.mp3',
    hasLocalAudio: true
  },
  shanghai: {
    name: '上海',
    emoji: '🌆',
    music: '《今夜没回家》',
    audio: 'shanghai.aac',
    hasLocalAudio: true
  },
  beijing: {
    name: '北京',
    emoji: '🏯',
    music: '《安河桥》',
    audio: 'beijing.mp3',
    hasLocalAudio: true
  },
  nanjing: {
    name: '南京',
    emoji: '🌸',
    music: '《恋爱通告》',
    audio: 'nanjing.mp3',
    hasLocalAudio: true
  },
  newyork: {
    name: '纽约',
    emoji: '🗽',
    music: '《Empire State of Mind》',
    audio: '',
    hasLocalAudio: false
  }
};

let currentCity = null;
let cityRevealed = false;

// ====== 打开城市卡片 ======
function openCity(cityKey) {
  const data = cityData[cityKey];
  if (!data) return;

  currentCity = cityKey;
  cityRevealed = false;

  // 暂停唱片旋转
  document.getElementById('vinyl').classList.add('paused');

  // 填充卡片内容
  document.getElementById('modalEmoji').textContent = data.emoji;
  document.getElementById('modalMusic').textContent = data.music;

  // 城市名默认隐藏
  const cityEl = document.getElementById('modalCity');
  cityEl.textContent = '????';
  cityEl.classList.add('hidden-city');

  // 重置交互区
  document.getElementById('modalActions').style.display = '';
  document.getElementById('guessArea').classList.remove('active');
  document.getElementById('guessResult').textContent = '';
  document.getElementById('guessInput').value = '';
  document.getElementById('listenBtn').classList.remove('active');
  document.getElementById('audioPlayer').classList.remove('active');

  // 停止可能正在播放的音频
  const audio = document.getElementById('cityAudio');
  audio.pause();
  audio.src = '';

  // 显示卡片
  document.getElementById('modalOverlay').classList.add('active');
}

// ====== 听音乐猜城市 ======
function startGuess() {
  const data = cityData[currentCity];
  if (!data) return;

  // 隐藏模式按钮
  document.getElementById('modalActions').style.display = 'none';

  if (data.hasLocalAudio) {
    // 有本地音频，直接播放
    playAudio(data.audio);
    document.getElementById('audioPlayer').classList.add('active');
    showToast('请根据旋律猜城市 🎵');
  } else {
    // 跳转网易云搜索
    const query = encodeURIComponent(data.music.replace(/[《》]/g, ''));
    window.open(`https://music.163.com/#/search/m/?s=${query}`, '_blank');
    showToast('请去网易云试听后再猜');
  }

  // 显示猜谜输入区
  document.getElementById('guessArea').classList.add('active');
}

// ====== 安全播放音频（兼容移动端） ======
function playAudio(audioSrc) {
  const audio = document.getElementById('cityAudio');
  audio.src = audioSrc;
  
  audio.play().then(() => {
    // 播放成功
  }).catch((error) => {
    // 自动播放被阻止，显示播放器让用户手动点击
    showToast('请点击播放按钮开始试听');
  });
}

// ====== 提交猜测 ======
function submitGuess() {
  const data = cityData[currentCity];
  const guess = document.getElementById('guessInput').value.trim();
  const resultEl = document.getElementById('guessResult');

  if (!guess) {
    resultEl.textContent = '请输入城市名';
    resultEl.className = 'guess-result wrong';
    return;
  }

  if (guess === data.name) {
    resultEl.textContent = '🎉 猜对了！就是' + data.name;
    resultEl.className = 'guess-result correct';
    // 揭晓城市名
    const cityEl = document.getElementById('modalCity');
    cityEl.textContent = data.name;
    cityEl.classList.remove('hidden-city');
    cityRevealed = true;
  } else {
    resultEl.textContent = '❌ 不对哦，再试试？';
    resultEl.className = 'guess-result wrong';
  }
}

// ====== 看城市听音乐 ======
function revealCity() {
  const data = cityData[currentCity];
  if (!data) return;

  // 显示城市名
  const cityEl = document.getElementById('modalCity');
  cityEl.textContent = data.name;
  cityEl.classList.remove('hidden-city');
  cityRevealed = true;

  // 隐藏模式按钮
  document.getElementById('modalActions').style.display = 'none';

  // 显示试听按钮
  document.getElementById('listenBtn').classList.add('active');
}

// ====== 试听歌曲 ======
function playMusic() {
  const data = cityData[currentCity];
  if (!data) return;

  if (data.hasLocalAudio) {
    playAudio(data.audio);
    document.getElementById('audioPlayer').classList.add('active');
    document.getElementById('listenBtn').classList.remove('active');
  } else {
    const query = encodeURIComponent(data.music.replace(/[《》]/g, ''));
    window.open(`https://music.163.com/#/search/m/?s=${query}`, '_blank');
  }
}

// ====== 关闭卡片 ======
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');

  // 恢复唱片旋转
  document.getElementById('vinyl').classList.remove('paused');

  // 停止音频
  const audio = document.getElementById('cityAudio');
  audio.pause();
  audio.currentTime = 0;

  currentCity = null;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    closeModal();
  }
}

// ====== 跳转便签板 ======
function goToMemo() {
  window.location.href = 'memo.html';
}

// ====== 提示消息 ======
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ====== 回车提交猜测 ======
document.addEventListener('DOMContentLoaded', function() {
